name: Build and Release Extension

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRÍTICO: Permite que o robô leia o histórico de commits do Git

      - name: Atualizar CHANGELOG.md automaticamente
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "CHANGELOG.md"
          skip-version-file: "true" # Evita tentar alterar package.json que não temos
          git-message: "docs: atualiza CHANGELOG.md para ${{ github.ref_name }} [skip ci]"

      - name: Injetar Versão no manifest.json
        run: |
          cd extension
          # Remove o 'v' do nome da tag (ex: transforma v1.1.2 em 1.1.2)
          VERSION=${GITHUB_REF_NAME#v}
          # Usa o jq para substituir o campo "version" dentro do arquivo
          jq ".version = \"$VERSION\"" manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Zipar a extensão
        run: |
          cd extension
          zip -r ../PromoPulse-Extension-${{ github.ref_name }}.zip ./*

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: PromoPulse-Extension-${{ github.ref_name }}.zip
          body: ${{ steps.changelog.outputs.clean_changelog }} # Usa o texto do changelog gerado na release!
