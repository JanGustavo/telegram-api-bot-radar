<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Telegram Radar</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 25% -10%,
            #123066 0%,
            rgba(18, 48, 102, 0) 45%
          ),
          radial-gradient(
            circle at 95% 10%,
            #0c5564 0%,
            rgba(12, 85, 100, 0) 38%
          ),
          linear-gradient(155deg, #030711 10%, #02060f 50%, #030915 100%);
        color: #e7f0ff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .wrap {
        width: 100%;
        max-width: 420px;
        margin: 36px auto;
        padding: 0 16px;
        box-sizing: border-box;
      }

      main {
        border-radius: 18px;
        border: 1px solid #274271;
        background: rgba(8, 19, 40, 0.92);
        padding: 18px;
        box-shadow: 0 14px 28px rgba(1, 7, 20, 0.5);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      .subtitle {
        margin: 5px 0 14px;
        color: #aac0e3;
        font-size: 0.88rem;
      }

      .field {
        margin-bottom: 10px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #c1d4f0;
        font-size: 0.82rem;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 12px;
        border: 1px solid #34527d;
        background: rgba(22, 41, 72, 0.75);
        color: #f0f7ff;
        padding: 10px 11px;
        outline: none;
      }

      input:focus {
        border-color: #67ddff;
        box-shadow: 0 0 0 2px rgba(80, 214, 255, 0.2);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 6px;
      }

      button {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.58;
        cursor: not-allowed;
      }

      #sendCodeBtn {
        background: linear-gradient(135deg, #3dd7ff 0%, #52bcff 100%);
        color: #042235;
      }

      #loginBtn {
        background: linear-gradient(135deg, #33dea9 0%, #44e9be 100%);
        color: #05261b;
      }

      .status {
        margin-top: 12px;
        border-radius: 12px;
        border: 1px solid #2f4871;
        background: rgba(15, 27, 50, 0.9);
        color: #b8cae6;
        padding: 10px;
        font-size: 0.86rem;
        min-height: 40px;
      }

      .status.success {
        border-color: #1f7b62;
        background: #0d3228;
        color: #9cf8d2;
      }

      .status.error {
        border-color: #8f2d3d;
        background: #321019;
        color: #ffb8c4;
      }

      .status.info {
        border-color: #2f5f8f;
        background: #10283d;
        color: #b0d7ff;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <main>
        <h1>Login Telegram</h1>
        <p class="subtitle">Envie o codigo e conecte sua conta.</p>

        <div class="field">
          <label for="phone">Telefone</label>
          <input id="phone" placeholder="+55 83..." />
        </div>

        <div class="field">
          <label for="code">Codigo</label>
          <input id="code" placeholder="12345" />
        </div>

        <div class="row">
          <button id="sendCodeBtn" type="button">Enviar codigo</button>
          <button id="loginBtn" type="button">Conectar</button>
        </div>

        <div id="status" class="status" aria-live="polite">
          Pronto para autenticar.
        </div>
      </main>
    </div>

    <script src="login.js"></script>
  </body>
</html>
