<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Radar | Popup</title>
    <link rel="icon" type="image/svg+xml" href="telegram_logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0088cc;
        --primary-hover: #0077b5;
        --bg-dark: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.8);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        width: 320px;
        background-color: var(--bg-dark);
        background-image: radial-gradient(
          circle at top,
          rgba(0, 136, 204, 0.2) 0%,
          transparent 70%
        );
        color: var(--text-main);
        padding: 16px;
        overflow: hidden;
      }

      .popup-container {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
        animation: slideUp 0.4s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: var(--primary);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
      }

      .logo-icon svg {
        width: 20px;
        height: 20px;
        fill: white;
      }

      h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      p {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 20px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: var(--primary);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 12px rgba(0, 136, 204, 0.2);
      }

      .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 136, 204, 0.3);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .footer {
        margin-top: 16px;
        text-align: center;
        font-size: 11px;
        color: var(--text-muted);
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="popup-container">
      <div class="header">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.88.03-.24.36-.48.99-.74 3.89-1.69 6.48-2.8 7.78-3.33 3.69-1.52 4.45-1.78 4.95-1.79.11 0 .36.03.52.16.13.1.17.24.19.34.02.07.02.21.01.27z"
            />
          </svg>
        </div>
        <h1>Telegram PromoPulse</h1>
      </div>

      <p>
        Acesse seu painel de ofertas e gerencie seus grupos e filtros em tempo
        real.
      </p>

      <button id="openPanel" class="btn">Entrar no painel</button>

      <div class="footer">v1.3.2 &bull; Telegram PromoPulse</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
